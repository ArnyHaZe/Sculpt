<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sculpt app icon</title>
  <desc id="desc">A glowing pink dumbbell on a dark purple rounded-square background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a1530"/>
      <stop offset="0.55" stop-color="#241040"/>
      <stop offset="1" stop-color="#150d1a"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb7dc"/>
      <stop offset="0.48" stop-color="#ff8fc7"/>
      <stop offset="1" stop-color="#ff4fa3"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.25 0 0 0.35  0 0 0.55 0 0.75  0 0 0 0.85 0" result="pinkGlow"/>
      <feMerge>
        <feMergeNode in="pinkGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="178" fill="#ff8fc7" opacity="0.08"/>
  <circle cx="256" cy="256" r="112" fill="#ff8fc7" opacity="0.10"/>
  <g filter="url(#glow)">
    <g filter="url(#shadow)" fill="url(#pink)">
      <rect x="190" y="229" width="132" height="54" rx="18"/>
      <rect x="125" y="202" width="44" height="108" rx="16"/>
      <rect x="86" y="216" width="31" height="80" rx="13"/>
      <rect x="55" y="232" width="23" height="48" rx="10"/>
      <rect x="343" y="202" width="44" height="108" rx="16"/>
      <rect x="395" y="216" width="31" height="80" rx="13"/>
      <rect x="434" y="232" width="23" height="48" rx="10"/>
    </g>
  </g>
  <path d="M100 384c58 36 254 36 312 0" fill="none" stroke="#ff8fc7" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
</svg>
