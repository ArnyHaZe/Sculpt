<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0f1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sculpt — Fitness Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#150d1a;color:#f3e9f0;font-family:-apple-system,'Segoe UI',sans-serif;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:#1e1024;flex-shrink:0;border-bottom:1px solid #33203c;}
#tb-title{font-size:19px;font-weight:800;letter-spacing:2px;color:#ff8fc7;}
.badge{color:#2a1030;font-size:11px;font-weight:800;padding:4px 11px;border-radius:20px;}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px;}
#content::-webkit-scrollbar{width:2px;}#content::-webkit-scrollbar-thumb{background:#33203c;}
#nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#1a0f1e;border-top:1px solid #33203c;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 1px 7px;gap:3px;background:none;border:none;cursor:pointer;color:#7a6280;font-size:8px;font-weight:600;}
.navbtn.on{color:#ff8fc7;}
.navbtn svg{width:19px;height:19px;}
.card{background:#1e1226;border:1px solid #33203c;border-radius:16px;margin:8px 14px;overflow:hidden;}
.chd{padding:13px 15px 10px;border-bottom:1px solid #33203c;display:flex;justify-content:space-between;align-items:center;}
.ctitle{font-size:15px;font-weight:800;letter-spacing:.5px;}
.csub{font-size:11px;color:#7a6280;margin-top:2px;}
.seclabel{font-size:11px;font-weight:700;color:#7a6280;letter-spacing:1.5px;padding:10px 15px 4px;}
.day-hero{margin:14px;background:linear-gradient(135deg,#3a1530,#241040);border:1px solid rgba(255,143,199,.25);border-radius:16px;padding:20px;position:relative;overflow:hidden;}
.day-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,143,199,.12),transparent 65%);}
.pulse{width:6px;height:6px;border-radius:50%;background:#ffb84d;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.bignum{font-family:'Segoe UI',sans-serif;font-size:20px;font-weight:800;}
.btn-full{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.pink{background:#ff8fc7;color:#2a1030;}
.soft{background:#2a1a32;color:#f3e9f0;border:1px solid #43304c;}
.sessic{display:flex;gap:8px;margin-top:6px;}
.sesspill{flex:1;padding:10px;border-radius:12px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #33203c;background:#2a1a32;color:#7a6280;}
.sesspill.on{background:#ff8fc7;color:#2a1030;border-color:#ff8fc7;}
.exb{padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid #33203c;}
.exb:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0;}
.pri-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.5px;flex-shrink:0;margin-top:2px;}
.sets-grid{display:grid;gap:6px;margin-top:8px;}
.set-cell{background:#2a1a32;border:1.5px solid #33203c;border-radius:9px;padding:8px 3px 6px;text-align:center;cursor:pointer;position:relative;}
.set-cell.done{border-color:#ff8fc7;background:rgba(255,143,199,.12);}
.set-cell.done::after{content:'✓';position:absolute;top:1px;right:4px;font-size:8px;color:#ff8fc7;}
.snum{font-size:9px;color:#7a6280;}
.sw{font-size:14px;font-weight:800;}
.sw.empty{color:#43304c;}
.sr{font-size:8px;color:#7a6280;}
.tip{font-size:11px;color:#c9a6c0;padding:8px 11px;background:rgba(255,143,199,.06);border-radius:8px;margin-top:8px;border-left:2px solid #ff8fc7;line-height:1.55;}
.feel{font-size:10px;color:#ffb84d;margin-top:6px;font-weight:600;}
.knee{font-size:10px;color:#7ad4c0;margin-top:6px;font-weight:600;}
#modal-bg,#swap-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:flex-end;justify-content:center;}
#modal-bg.open,#swap-bg.open{display:flex;}
#milestone-bg.open{display:flex !important;}
.modal{background:#1e1226;border:1px solid #33203c;border-radius:22px 22px 0 0;padding:20px 18px 28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeUp .3s ease;}
.mtitle{font-size:20px;font-weight:800;}
.msub{font-size:12px;color:#7a6280;margin-bottom:6px;}
.hint{font-size:11px;padding:7px 11px;border-radius:8px;margin-bottom:8px;border-left:2px solid;line-height:1.5;}
.mrow{display:flex;gap:10px;align-items:center;margin-bottom:12px;}
.mlabel{font-size:11px;color:#7a6280;width:52px;flex-shrink:0;}
.minp{flex:1;background:#2a1a32;border:1.5px solid #33203c;color:#f3e9f0;font-size:22px;font-weight:800;padding:11px;border-radius:10px;outline:none;text-align:center;width:100%;}
.minp:focus{border-color:#ff8fc7;}
.rir-grid{display:flex;gap:5px;}
.rir-btn{flex:1;padding:11px 0;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#2a1a32;color:#7a6280;}
.qbtn{padding:7px 11px;background:#2a1a32;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;}
.qbtn.minus{color:#ff6b9d;border:1px solid rgba(255,107,157,.35);}
.qbtn.plus{color:#ff8fc7;border:1px solid rgba(255,143,199,.35);}
.mbtn{padding:13px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.ci-input{width:100%;background:#2a1a32;border:1.5px solid #33203c;color:#f3e9f0;font-size:18px;font-weight:800;padding:11px 12px;border-radius:10px;outline:none;}
.ci-input:focus{border-color:#ff8fc7;}
.ci-ta{width:100%;background:#2a1a32;border:1.5px solid #33203c;color:#f3e9f0;font-size:13px;padding:11px 12px;border-radius:10px;outline:none;resize:none;min-height:80px;font-family:inherit;}
.ci-ta:focus{border-color:#ff8fc7;}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:#ff8fc7;color:#2a1030;font-weight:800;font-size:13px;padding:9px 22px;border-radius:22px;z-index:400;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#rest-bar{display:none;position:fixed;bottom:86px;left:14px;right:14px;z-index:60;background:#1e1226;border:1px solid #ff8fc7;border-radius:14px;padding:11px 14px;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
#rest-bar.show{display:flex;}
</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <div id="tb-title">✿ SCULPT</div>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="badge" id="streak-badge" style="background:#ffb84d">🔥 0</span>
      <span class="badge" id="week-badge" style="background:#ff8fc7">WEEK 1</span>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="navbtn on" id="nav-home" onclick="go('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
    <button class="navbtn" id="nav-workout" onclick="go('workout')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16M2 9l2 3-2 3M22 9l-2 3 2 3"/></svg>Workout</button>
    <button class="navbtn" id="nav-progress" onclick="go('progress')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progress</button>
    <button class="navbtn" id="nav-checkin" onclick="go('checkin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Check-In</button>
    <button class="navbtn" id="nav-rewards" onclick="go('rewards')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="6"/><path d="M15.5 13l2 8-5.5-3-5.5 3 2-8"/></svg>Rewards</button>
    <button class="navbtn" id="nav-guide" onclick="go('guide')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>Guide</button>
  </nav>
</div>

<!-- LOG MODAL -->
<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mtitle" id="m-title">Log Set</div>
    <div class="msub" id="m-sub"></div>
    <div id="m-suggest"></div>
    <div id="m-last"></div>
    <div class="mrow"><span class="mlabel">Weight</span><input type="number" class="minp" id="m-weight" inputmode="decimal" placeholder="0" step="0.5"><span id="m-unit" style="font-size:12px;color:#7a6280;font-weight:600"></span></div>
    <div class="mrow"><span class="mlabel">Reps</span><input type="number" class="minp" id="m-reps" inputmode="numeric" placeholder="0"></div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:#7a6280;margin-bottom:6px">How many more reps could you have done? · <span id="m-rir-val">—</span></div>
      <div class="rir-grid" id="m-rir-grid"></div>
      <div style="font-size:9px;color:#7a6280;margin-top:5px;text-align:center">0 = none left (very hard) · 3+ = lots left (easy)</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="m-quick"></div>
    <input type="text" class="ci-input" id="m-note" placeholder="Note (how it felt, any niggles...)" style="font-size:12px;font-weight:400;margin-bottom:16px">
    <div style="display:flex;gap:8px">
      <button class="mbtn soft" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="mbtn" id="m-clear" style="flex:.8;background:rgba(255,107,157,.12);color:#ff6b9d;border:1px solid rgba(255,107,157,.35);display:none" onclick="clearCurrentSet()">Clear</button>
      <button class="mbtn pink" id="m-save" style="flex:1.6" onclick="saveCurrentSet()">Save ✓</button>
    </div>
  </div>
</div>

<!-- SWAP MODAL -->
<div id="swap-bg" onclick="if(event.target===this)closeSwap()">
  <div class="modal">
    <div class="mtitle">Swap Exercise</div>
    <div class="msub" id="sw-sub"></div>
    <div id="sw-list"></div>
    <button class="mbtn soft" style="width:100%;margin-top:6px" onclick="closeSwap()">Cancel</button>
  </div>
</div>

<!-- MILESTONE CELEBRATION -->
<div id="milestone-bg" style="display:none;position:fixed;inset:0;background:rgba(20,8,26,.96);z-index:500;align-items:center;justify-content:center;padding:24px">
  <div style="max-width:420px;width:100%;text-align:center;animation:fadeUp .4s ease">
    <div id="ms-badge" style="font-size:80px;margin-bottom:8px;animation:pulse 1.5s infinite">🌸</div>
    <div style="font-size:12px;font-weight:800;letter-spacing:3px;color:#ffb84d;margin-bottom:4px">MILESTONE UNLOCKED</div>
    <div id="ms-name" style="font-size:28px;font-weight:800;color:#ff8fc7;margin-bottom:4px">First Bloom</div>
    <div id="ms-weeks" style="font-size:12px;color:#7a6280;margin-bottom:18px">Weeks 1–4 complete!</div>
    <div id="ms-msg" style="font-size:14px;color:#f3e9f0;line-height:1.6;margin-bottom:18px"></div>
    <div id="ms-voucher" style="font-size:14px;color:#f3e9f0;line-height:1.5;background:linear-gradient(135deg,rgba(255,143,199,.2),rgba(255,184,77,.15));border:1px solid #ff8fc7;border-radius:14px;padding:16px;margin-bottom:20px"></div>
    <button class="btn-full pink" onclick="closeMilestone()">Amazing! Continue 🎉</button>
    <div style="font-size:11px;color:#7a6280;margin-top:10px">Find your rewards anytime in the Rewards tab</div>
  </div>
</div>

<!-- REST TIMER -->
<div id="rest-bar">
  <div class="bignum" id="rest-time" style="color:#ff8fc7;min-width:52px">1:30</div>
  <div style="flex:1"><div style="font-size:10px;color:#7a6280;margin-bottom:4px">REST — breathe & get ready</div><div style="height:5px;background:#2a1a32;border-radius:3px;overflow:hidden"><div id="rest-fill" style="width:100%;height:100%;background:#ff8fc7;border-radius:3px;transition:width 1s linear"></div></div></div>
  <button class="qbtn plus" onclick="addRest(30)">+30</button>
  <button class="mbtn pink" style="padding:6px 10px;font-size:11px" onclick="stopRest()">Skip</button>
</div>

<div id="toast"></div>

<script>
"use strict";
// ═══════════════ PROGRAM: Lower / Upper / Lower · Beginner · Glute-focused ═══════════════
// RIR-based gentle progression. Knee-friendly selection. Priorities: Glute>Ham>Core>Legs>Back.
var SESSIONS=[
  {id:"lower1",lbl:"LOWER A",full:"Lower Body A",focus:"Glute & Hamstring Focus",exs:[
    {id:"hip_thrust",name:"Barbell Hip Thrust",pri:"GLUTE",base:30,unit:"kg",inc:2.5,sets:4,reps:"10–12",
      tip:"Back on bench, bar over hips. Push through heels, squeeze glutes hard at the top, chin tucked.",feel:"Feel it in your glutes, NOT your lower back.",knee:"Knee-friendly ⓘ shins vertical at top."},
    {id:"rdl",name:"Romanian Deadlift (Dumbbell)",pri:"HAM",base:10,unit:"kg/h",inc:2,sets:4,reps:"10–12",
      tip:"Soft knees, push hips BACK, lower the weights down your thighs. Feel a stretch, then squeeze glutes to stand.",feel:"Stretch in the back of your thighs (hamstrings).",knee:"Knee-friendly ⓘ barely bend the knees."},
    {id:"glute_bridge_m",name:"Glute Bridge Machine / Hip Thrust Machine",pri:"GLUTE",base:25,unit:"kg",inc:2.5,sets:4,reps:"12–15",
      tip:"Same idea as hip thrust but supported. Great for really targeting glutes safely.",feel:"Deep glute squeeze at the top — pause 1 second.",knee:""},
    {id:"leg_curl",name:"Lying Leg Curl",pri:"HAM",base:20,unit:"kg",inc:2.5,sets:4,reps:"12–15",
      tip:"Curl your heels toward your bum, control the way down slowly.",feel:"Back of the thighs working.",knee:"Knee-friendly ⓘ no standing load."},
    {id:"cable_kick",name:"Cable Glute Kickback",pri:"GLUTE",base:8,unit:"kg",inc:2,sets:4,reps:"12–15/leg",
      tip:"Ankle strap on, kick leg straight back and up, squeeze at the top. Keep hips still.",feel:"Upper glute contraction.",knee:""},
    {id:"plank",name:"Plank Hold",pri:"CORE",base:0,unit:"sec",inc:5,sets:4,reps:"20–40 sec",
      tip:"Straight line head to heels, squeeze abs and glutes. Don't let hips sag.",feel:"Whole core braced.",knee:""},
  ]},
  {id:"upper",lbl:"UPPER",full:"Upper Body",focus:"Back, Posture & Arms",exs:[
    {id:"lat_pull",name:"Lat Pulldown",pri:"BACK",base:25,unit:"kg",inc:2.5,sets:4,reps:"10–12",
      tip:"Pull the bar to your upper chest, lead with your elbows, squeeze shoulder blades down.",feel:"Sides of your back (lats) working.",knee:""},
    {id:"seated_row",name:"Seated Cable Row",pri:"BACK",base:25,unit:"kg",inc:2.5,sets:4,reps:"10–12",
      tip:"Sit tall, pull the handle to your belly, squeeze your shoulder blades together.",feel:"Middle back squeezing — great for posture.",knee:""},
    {id:"db_press",name:"Dumbbell Shoulder Press",pri:"SHOULDER",base:6,unit:"kg/h",inc:1,sets:4,reps:"10–12",
      tip:"Press dumbbells up overhead, don't arch your back. Control them down.",feel:"Shoulders working.",knee:""},
    {id:"face_pull",name:"Face Pull",pri:"POSTURE",base:15,unit:"kg",inc:2,sets:4,reps:"15–20",
      tip:"Pull the rope toward your face, elbows high, squeeze the back of your shoulders. Amazing for posture.",feel:"Upper back and rear shoulders.",knee:""},
    {id:"db_curl",name:"Dumbbell Bicep Curl",pri:"ARMS",base:5,unit:"kg/h",inc:1,sets:4,reps:"12–15",
      tip:"Curl the weights up, keep elbows tucked, lower slowly.",feel:"Front of your arms.",knee:""},
    {id:"tri_push",name:"Tricep Rope Pushdown",pri:"ARMS",base:12,unit:"kg",inc:2,sets:4,reps:"12–15",
      tip:"Push the rope down, straighten your arms fully, keep elbows pinned to your sides.",feel:"Back of your arms.",knee:""},
  ]},
  {id:"lower2",lbl:"LOWER B",full:"Lower Body B",focus:"Glute & Leg Shape",exs:[
    {id:"hip_thrust2",name:"Barbell Hip Thrust",pri:"GLUTE",base:30,unit:"kg",inc:2.5,sets:4,reps:"10–12",
      tip:"Your #1 glute builder — this is why it's here twice a week. Full squeeze at the top.",feel:"Glutes doing all the work.",knee:"Knee-friendly ⓘ shins vertical at top."},
    {id:"goblet_squat",name:"Goblet Box Squat",pri:"LEGS",base:10,unit:"kg",inc:2.5,sets:4,reps:"10–12",
      tip:"Hold a dumbbell at your chest, sit back onto a box/bench, stand up squeezing glutes. Box keeps depth safe.",feel:"Glutes and thighs.",knee:"Knee-safe ⓘ box controls depth — never crash down."},
    {id:"hip_abduction",name:"Hip Abduction Machine",pri:"GLUTE",base:30,unit:"kg",inc:2.5,sets:4,reps:"15–20",
      tip:"Push your knees outward against the pads, lean forward slightly to hit the upper glutes.",feel:"Outer glutes (side-butt) — key for shape.",knee:"Knee-friendly ⓘ no knee bend."},
    {id:"back_ext",name:"Glute-Focused Back Extension",pri:"HAM",base:0,unit:"kg",inc:2.5,sets:4,reps:"12–15",
      tip:"Round your upper back slightly, squeeze glutes to lift. Targets glutes + hamstrings, protects lower back.",feel:"Glutes and hamstrings, not lower back.",knee:""},
    {id:"walking_lunge",name:"Walking Lunge (Dumbbell)",pri:"LEGS",base:5,unit:"kg/h",inc:1,sets:4,reps:"10/leg",
      tip:"Step forward, drop your back knee toward the floor, push through your front heel.",feel:"Glutes and thighs.",knee:"⚠ If knees complain, swap to Reverse Lunge (tap ⇄)."},
    {id:"hanging_knee",name:"Cable Crunch",pri:"CORE",base:15,unit:"kg",inc:2.5,sets:4,reps:"12–15",
      tip:"Kneel, hold rope by your head, crunch down using your abs. Round your back.",feel:"Abs contracting.",knee:""},
  ]},
];

var WARMUP=[
  {id:"w1",text:"5 min walk / bike (get warm)",sets:"5 min"},
  {id:"w2",text:"Glute Bridges (bodyweight)",sets:"2×15"},
  {id:"w3",text:"Bodyweight Squats",sets:"2×12"},
  {id:"w4",text:"Leg Swings + Hip Circles",sets:"10 each"},
  {id:"w5",text:"Band Walks (if available)",sets:"2×15"},
];

var SWAPS={
  hip_thrust:[{name:"Hip Thrust Machine",note:"Guided & supported"},{name:"Smith Machine Hip Thrust",note:"Fixed bar path"},{name:"Single-Leg Glute Bridge",note:"Bodyweight start"}],
  hip_thrust2:[{name:"Hip Thrust Machine",note:"Guided & supported"},{name:"Smith Machine Hip Thrust",note:"Fixed bar path"}],
  rdl:[{name:"Barbell RDL",note:"More load later"},{name:"Cable RDL",note:"Constant tension"},{name:"Seated Leg Curl",note:"Machine, easiest"}],
  glute_bridge_m:[{name:"Barbell Glute Bridge",note:"Free weight"},{name:"Frog Pumps",note:"Bodyweight burnout"}],
  leg_curl:[{name:"Seated Leg Curl",note:"Different angle"},{name:"Nordic Curl (assisted)",note:"Advanced"}],
  cable_kick:[{name:"Machine Kickback",note:"Guided"},{name:"Band Kickback",note:"At home too"}],
  plank:[{name:"Dead Bug",note:"Easier on back"},{name:"Side Plank",note:"Waist focus"}],
  lat_pull:[{name:"Assisted Pull-Up",note:"Builds toward pull-ups"},{name:"Neutral-Grip Pulldown",note:"Comfier grip"}],
  seated_row:[{name:"Chest-Supported Row",note:"No lower-back"},{name:"Single-Arm DB Row",note:"One side at a time"}],
  db_press:[{name:"Machine Shoulder Press",note:"Guided path"},{name:"Seated DB Press",note:"More support"}],
  face_pull:[{name:"Reverse Pec Deck",note:"Machine"},{name:"Band Pull-Apart",note:"At home too"}],
  db_curl:[{name:"Cable Curl",note:"Constant tension"},{name:"Machine Curl",note:"Guided"}],
  tri_push:[{name:"Overhead Extension",note:"Different angle"},{name:"Bench Dip",note:"Bodyweight"}],
  goblet_squat:[{name:"Leg Press (high feet)",note:"Knee-friendly, glute focus"},{name:"Hack Squat",note:"Back-supported"}],
  hip_abduction:[{name:"Band Side Steps",note:"At home too"},{name:"Cable Abduction",note:"Standing version"}],
  back_ext:[{name:"Seated Leg Curl",note:"Machine alt"},{name:"Cable Pull-Through",note:"Glute focus"}],
  walking_lunge:[{name:"Reverse Lunge",note:"Knee-friendly"},{name:"Step-Ups (low box)",note:"Controlled"},{name:"Leg Press",note:"No balance needed"}],
  hanging_knee:[{name:"Plank Hold",note:"No equipment"},{name:"Lying Leg Raise",note:"Lower abs"}],
};

var PRI_COLORS={GLUTE:"#ff8fc7",HAM:"#ffb84d",CORE:"#7ad4c0",LEGS:"#c98fff",BACK:"#8fb8ff",POSTURE:"#8fb8ff",SHOULDER:"#c98fff",ARMS:"#ff9f8f"};

// Rotation order: the 3 sessions cycle continuously regardless of calendar day
var ROTATION=["lower1","upper","lower2"];

function sessionById(id){for(var i=0;i<SESSIONS.length;i++)if(SESSIONS[i].id===id)return SESSIONS[i];return SESSIONS[0];}
function exById(id){for(var i=0;i<SESSIONS.length;i++)for(var j=0;j<SESSIONS[i].exs.length;j++)if(SESSIONS[i].exs[j].id===id)return SESSIONS[i].exs[j];return null;}
function restTime(ex){if(!ex)return 90;if(ex.pri==="GLUTE"||ex.pri==="LEGS"||ex.pri==="HAM")return 90;if(ex.pri==="CORE")return 45;return 60;}

// Gentle beginner progression via RIR (reps in reserve).
// If she had 3+ reps left (too easy) → nudge up. If 0 (too hard) → hold/reduce.
function suggestNext(sets,ex){
  if(!ex)return{weight:ex?ex.base:0,reason:"",hasHistory:false};
  var done=sets.filter(function(s){return s&&(s.weight!==undefined);});
  if(!done.length)return{weight:ex.base,reason:"",hasHistory:false};
  var topWeight=Math.max.apply(null,done.map(function(s){return parseFloat(s.weight)||0;}));
  var topSets=done.filter(function(s){return (parseFloat(s.weight)||0)===topWeight;});
  var avgRir=topSets.reduce(function(a,s){return a+(s.rir!==null&&s.rir!==undefined?parseFloat(s.rir):2);},0)/topSets.length;
  if(ex.unit==="sec")return{weight:topWeight,reason:"Try holding a little longer if last time felt good",hasHistory:true};
  if(avgRir>=3)return{weight:topWeight,reason:"Last time was easy — go a little heavier this time 💪",hasHistory:true};
  if(avgRir>=1.5)return{weight:topWeight,reason:"You're ready to step the weight up a touch",hasHistory:true};
  if(avgRir>=0.5)return{weight:topWeight,reason:"Great challenge last time — stay here & nail your form",hasHistory:true};
  return{weight:topWeight,reason:"That was tough — repeat the same weight, you'll own it soon",hasHistory:true};
}

// ═══════════════ STATE + STORAGE ═══════════════
var KEY="sculpt_v1",BACKUP="sculpt_v1_backup";
var state={page:"home",sessionIdx:0,session:"lower1",viewWeek:null};

function db(){try{return JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){return{};}}
function saveDb(d){try{localStorage.setItem(KEY,JSON.stringify(d));localStorage.setItem(BACKUP,JSON.stringify(d));}catch(e){}}
function getVal(k){return db()[k];}
function setVal(k,v){var d=db();d[k]=v;saveDb(d);}
function delVal(k){var d=db();delete d[k];saveDb(d);}

// ── WEEK / SESSION MODEL ──
// Sets keyed by week + specific session slot. Each of D1(lower1)/D2(upper)/D3(lower2)
// is a fixed slot. A session is "done this week" once marked complete.
// The current week advances only when all 3 slots are completed.
function getCurWeek(){return parseInt(db()["curweek"]||"1");}
function setCurWeek(w){setVal("curweek",w);}
function currentWeek(){return getCurWeek();}
// Is a given session slot completed in a given week?
function isSessionDone(week,sessId){return !!db()["done_"+week+"_"+sessId];}
function markSessionDone(week,sessId){setVal("done_"+week+"_"+sessId,1);}
// How many of the 3 slots are done this week
function doneCountThisWeek(){var w=getCurWeek(),n=0;ROTATION.forEach(function(sid){if(isSessionDone(w,sid))n++;});return n;}
// The next suggested slot = first uncompleted in D1->D2->D3 order
function nextSessionId(){var w=getCurWeek();for(var i=0;i<ROTATION.length;i++){if(!isSessionDone(w,ROTATION[i]))return ROTATION[i];}return ROTATION[0];}
// Which day-number (1/2/3) is the next slot
function nextDayNum(){var w=getCurWeek();for(var i=0;i<ROTATION.length;i++){if(!isSessionDone(w,ROTATION[i]))return i+1;}return 1;}

function getSet(week,sessId,exId,s){return db()["s_"+week+"_"+sessId+"_"+exId+"_"+s]||null;}
function putSet(week,sessId,exId,s,val){setVal("s_"+week+"_"+sessId+"_"+exId+"_"+s,val);}
function delSet(week,sessId,exId,s){delVal("s_"+week+"_"+sessId+"_"+exId+"_"+s);}
function getCI(w){return db()["ci_"+w]||{};}
function putCI(w,obj){setVal("ci_"+w,obj);}
function getWU(week,sessId,id){return !!db()["wu_"+week+"_"+sessId+"_"+id];}
function togWU(week,sessId,id){var d=db();var k="wu_"+week+"_"+sessId+"_"+id;if(d[k])delete d[k];else d[k]=1;saveDb(d);}
function swapKey(exId){return "swap_"+exId;}
function getSwappedName(ex){return db()[swapKey(ex.id)]||ex.name;}

function bestForLift(exId){var d=db(),best=0;for(var k in d){if(k.indexOf("s_")===0&&k.indexOf("_"+exId+"_")>-1&&d[k]&&d[k].weight!==undefined)best=Math.max(best,parseFloat(d[k].weight)||0);}return best;}
function totalSets(){var d=db(),n=0;for(var k in d){if(k.indexOf("s_")===0&&d[k]&&d[k].weight!==undefined)n++;}return n;}
function setsForSession(week,sessId){var sess=sessionById(sessId),n=0;sess.exs.forEach(function(ex){for(var s=1;s<=6;s++){if(getSet(week,sessId,ex.id,s))n++;}});return n;}
function isPR(exId,weight){return parseFloat(weight)>bestForLift(exId);}
// Last time this exercise was done in this session slot (search earlier weeks)
function getLastTime(week,sessId,exId,setNum){for(var pw=week-1;pw>=1;pw--){var v=getSet(pw,sessId,exId,setNum);if(v&&v.weight!==undefined)return{weight:v.weight,reps:v.reps,rir:v.rir,week:pw};}return null;}
function getSuggestion(week,sessId,ex){for(var pw=week-1;pw>=1;pw--){var prev=[];for(var s=1;s<=6;s++){var v=getSet(pw,sessId,ex.id,s);if(v)prev.push(v);}if(prev.length)return suggestNext(prev,ex);}return{weight:ex.base,reason:"",hasHistory:false};}

// Streak = total completed session-slots across all weeks
function streak(){var d=db(),n=0;for(var k in d){if(k.indexOf("done_")===0&&d[k])n++;}return n;}

// ── MILESTONE / REWARD SYSTEM ──
// A week is "fully complete" when: all 3 sessions marked done, every exercise has
// all its programmed sets logged, AND a check-in (weight or a measurement) exists.
function isExerciseFullyLogged(week,sessId,ex){for(var s=1;s<=ex.sets;s++){if(!getSet(week,sessId,ex.id,s))return false;}return true;}
function isSessionFullyLogged(week,sessId){var sess=sessionById(sessId);for(var i=0;i<sess.exs.length;i++){if(!isExerciseFullyLogged(week,sessId,sess.exs[i]))return false;}return true;}
function hasCheckin(week){var ci=getCI(week);return !!(ci&&(ci.weight||ci.hips||ci.glute||ci.thigh||ci.waist));}
function isWeekFullyComplete(week){
  for(var i=0;i<ROTATION.length;i++){if(!isSessionDone(week,ROTATION[i]))return false;if(!isSessionFullyLogged(week,ROTATION[i]))return false;}
  return hasCheckin(week);
}
// A block = 4 consecutive weeks. Block N covers weeks (N-1)*4+1 .. N*4. Total 6 blocks over 24 weeks.
function isBlockComplete(blockN){var start=(blockN-1)*4+1;for(var w=start;w<start+4;w++){if(!isWeekFullyComplete(w))return false;}return true;}
function blocksUnlocked(){var arr=[];for(var b=1;b<=6;b++){if(isBlockComplete(b))arr.push(b);}return arr;}
// Voucher state per block: 'locked' (not earned), 'unlocked' (earned, not redeemed), 'redeemed'
function voucherState(blockN){if(!isBlockComplete(blockN))return "locked";return db()["voucher_"+blockN]==="redeemed"?"redeemed":"unlocked";}
function redeemVoucher(blockN){setVal("voucher_"+blockN,"redeemed");}
// Track which milestone celebrations we've already shown (so it pops once)
function milestoneSeen(blockN){return !!db()["ms_seen_"+blockN];}
function markMilestoneSeen(blockN){setVal("ms_seen_"+blockN,1);}
// Return a newly-completed block that hasn't been celebrated yet, or 0
function pendingMilestone(){for(var b=1;b<=6;b++){if(isBlockComplete(b)&&!milestoneSeen(b))return b;}return 0;}

// ═══════════════ REST ═══════════════
function fmtTime(s){return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0");}
function startRest(sec){rest={remaining:sec,total:sec};document.getElementById("rest-bar").classList.add("show");updateRestUI();if(restInterval)clearInterval(restInterval);restInterval=setInterval(function(){rest.remaining--;if(rest.remaining<=0){try{if(navigator.vibrate)navigator.vibrate(200);}catch(e){}stopRest();return;}updateRestUI();},1000);}
function updateRestUI(){document.getElementById("rest-time").textContent=fmtTime(rest.remaining);document.getElementById("rest-fill").style.width=(rest.remaining/rest.total*100)+"%";}
function addRest(s){rest.remaining+=s;rest.total=Math.max(rest.total,rest.remaining);updateRestUI();}
function stopRest(){if(restInterval)clearInterval(restInterval);restInterval=null;document.getElementById("rest-bar").classList.remove("show");}

var bwChart=null;
function draw(){
  document.getElementById("week-badge").textContent="WK "+currentWeek()+"/24";
  document.getElementById("streak-badge").textContent="🔥 "+streak();
  if(bwChart){bwChart.destroy();bwChart=null;}
  var c=document.getElementById("content");c.innerHTML="";c.className="fade";
  if(state.page==="home")drawHome(c);
  else if(state.page==="workout")drawWorkout(c);
  else if(state.page==="progress")drawProgress(c);
  else if(state.page==="checkin")drawCheckin(c);
  else if(state.page==="guide")drawGuide(c);

function drawHome(c){
  var nextId=nextSessionId();var sess=sessionById(nextId);
  var wk=currentWeek();
  var nextDay=nextDayNum(); // 1/2/3 = next uncompleted slot

  cards.forEach(function(card){html+='<div class="card"><div style="padding:15px"><div style="font-size:15px;font-weight:800;margin-bottom:8px">'+card.t+'</div><div style="font-size:13px;color:#c9a6c0;line-height:1.65">'+card.b+'</div></div></div>';});
  // Data backup
  html+='<div class="seclabel">BACKUP YOUR DATA</div><div class="card"><div style="padding:15px"><button class="btn-full pink" style="margin-bottom:8px" onclick="doExport()">⬇ Download Backup</button><button class="btn-full soft" onclick="doImport()">↑ Restore From Backup</button><textarea class="ci-ta" id="import-text" placeholder="Paste backup here to restore..." style="font-size:11px;margin-top:8px;min-height:60px"></textarea><div style="font-size:11px;color:#7a6280;margin-top:8px">💾 Download a backup now and then so you never lose your progress.</div></div></div>';
  html+='<div style="height:12px"></div>';
  c.innerHTML=html;
}
function doExport(){var blob=new Blob([JSON.stringify(db(),null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="sculpt_backup_"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast("Downloaded ✓");}
function doImport(){var txt=document.getElementById("import-text").value;if(!txt){toast("Paste your backup first");return;}try{var p=JSON.parse(txt);saveDb(p);toast("Restored ✓");draw();}catch(e){toast("That backup looks invalid");}}

// ═══════════════ INIT ═══════════════
(function init(){
  state.session=nextSessionId();
  draw();
})();
</script>
